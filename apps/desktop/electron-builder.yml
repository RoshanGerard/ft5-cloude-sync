appId: tech.forti5.ft5-cloude-sync
productName: FT5 Cloude Sync
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
  # node_modules is NOT included by electron-builder's default when `files`
  # is specified (the list replaces the default). Without this, transitive
  # runtime deps pulled in via workspace packages (e.g. `@smithy/*` under
  # `@aws-sdk/client-s3` under `@ft5/fs-datasource-engine`) fail to resolve
  # at runtime with `Cannot find module '@smithy/util-buffer-from'`.
  - node_modules/**/*
extraResources:
  - from: src/renderer/out
    to: renderer
    filter:
      - "**/*"
asar: true
asarUnpack:
  - "**/*.node"
mac:
  target: dmg
win:
  target: nsis
linux:
  target:
    - AppImage
    - deb
publish: null
